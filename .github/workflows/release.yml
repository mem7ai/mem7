name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # ── Build Python wheels for all platforms ──────────────────────────
  build-wheels:
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            sdist: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_24"
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist ${{ matrix.sdist && '--sdist' || '' }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}
          path: dist

  # ── Build Node.js native addons for all platforms ──────────────────
  build-node:
    name: Build node (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src/bindings/mem7-node
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          cache: false
      - run: npm install
      - name: Build native module
        run: npx napi build -p mem7-node --platform --release --target ${{ matrix.target }} ${{ contains(matrix.target, 'linux') && '--use-napi-cross' || '' }}
        env:
          CFLAGS_aarch64_unknown_linux_gnu: "-D__ARM_ARCH=8"
      - uses: actions/upload-artifact@v7
        with:
          name: node-${{ matrix.target }}
          path: src/bindings/mem7-node/mem7.*.node
          if-no-files-found: error

  # ── Publish Python package to PyPI ─────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mem7/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          skip-existing: true

  # ── Publish Node.js package to npm ─────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: [build-node]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/bindings/mem7-node
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - run: npm install
      - name: Download all native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: node-*
          merge-multiple: true
          path: src/bindings/mem7-node/artifacts
      - name: Move artifacts and publish
        run: |
          npx napi create-npm-dirs
          npx napi artifacts
          npm publish --access public --provenance

  # ── Publish Rust crates to crates.io ───────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - name: Publish crates (dependency order)
        run: |
          set -e
          publish() {
            echo "Publishing $1..."
            cargo publish -p "$1" --allow-dirty || echo "⚠ $1 skipped (already published or error)"
            sleep 15
          }
          publish mem7-error
          publish mem7-config
          publish mem7-core
          publish mem7-llm
          publish mem7-embedding
          publish mem7-vector
          publish mem7-history
          publish mem7-dedup
          publish mem7-store
          publish mem7
