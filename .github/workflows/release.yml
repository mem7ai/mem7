name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # ── Build Python wheels for all platforms ──────────────────────────
  build-wheels:
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # aarch64-unknown-linux-gnu removed: ring crate's ARM assembly
          # fails to cross-compile in the manylinux x86_64 container.
          # TODO: re-add with Zig cross-compilation (maturin --zig).
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish Python package to PyPI ─────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mem7/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v6
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

  # ── Publish Rust crates to crates.io ───────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: [publish-pypi]
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Publish crates (dependency order)
        run: |
          set -e
          publish() {
            echo "Publishing $1..."
            cargo publish -p "$1" --allow-dirty || echo "⚠ $1 skipped (already published or error)"
            sleep 15
          }
          publish mem7-error
          publish mem7-config
          publish mem7-core
          publish mem7-llm
          publish mem7-embedding
          publish mem7-vector
          publish mem7-history
          publish mem7-dedup
          publish mem7-store
